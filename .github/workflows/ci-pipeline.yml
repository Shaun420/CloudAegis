name: CloudAegis CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ---------------------------------------------------
  # STAGE 1: Continuous Integration (Quality & Testing)
  # ---------------------------------------------------
  build-and-lint:
    name: Code Quality & Dependencies
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install Dependencies
      run: npm install

    - name: Enforce Code Quality (ESLint)
      run: npx eslint .

  # ---------------------------------------------------
  # STAGE 2: Continuous Delivery (Containerization)
  # ---------------------------------------------------
  docker-build:
    name: Build Docker Container
    needs: build-and-lint # CRITICAL: This ensures Docker only builds if Stage 1 passes
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Test Docker Image Build
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false # Set to false because we are just validating it builds successfully
        tags: cloudaegis-app:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max